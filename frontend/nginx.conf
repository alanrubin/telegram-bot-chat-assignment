server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the WebSocket to the backend so the browser uses one origin.
    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Keep idle WebSocket connections open (long-poll/quiet periods).
        proxy_read_timeout 3600s;
    }

    # Single-page app: serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
